<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PVmusic — Sign in to stream your vibe.">
  <title>PVmusic — Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-animation">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="bg-orb bg-orb-4"></div>
    <div class="bg-particles" id="bg-particles"></div>
  </div>

  <!-- Login Container -->
  <div class="login-wrapper">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon-large">🎵</div>
      <h1 class="logo-title">PVmusic</h1>
      <p class="logo-tagline">Stream Your Vibe</p>
    </div>

    <!-- Card -->
    <div class="login-card" id="login-card">

      <!-- Tab Switcher -->
      <div class="tab-switcher">
        <button class="tab-btn active" id="tab-login" data-tab="login">Log In</button>
        <button class="tab-btn" id="tab-signup" data-tab="signup">Sign Up</button>
        <div class="tab-indicator" id="tab-indicator"></div>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="form-login" autocomplete="off">
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="login-username" placeholder="Username or Email" required autocomplete="username">
          <div class="input-glow"></div>
        </div>

        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
          <button type="button" class="toggle-password" id="toggle-login-pw" title="Show password">👁</button>
          <div class="input-glow"></div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me" checked>
            <span class="custom-checkbox"></span>
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit" id="btn-login">
          <span class="btn-text">Log In</span>
          <span class="btn-loader hidden" id="login-loader">
            <span class="spinner"></span>
          </span>
        </button>

        <div class="form-error hidden" id="login-error"></div>
      </form>

      <!-- Signup Form -->
      <form class="auth-form hidden" id="form-signup" autocomplete="off">
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="signup-name" placeholder="Full Name" required>
          <div class="input-glow"></div>
        </div>

        <div class="input-group">
          <span class="input-icon">✉️</span>
          <input type="email" id="signup-email" placeholder="Email Address" required>
          <div class="input-glow"></div>
        </div>

        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="signup-password" placeholder="Create Password" required minlength="6">
          <button type="button" class="toggle-password" id="toggle-signup-pw" title="Show password">👁</button>
          <div class="input-glow"></div>
        </div>

        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="signup-confirm" placeholder="Confirm Password" required minlength="6">
          <div class="input-glow"></div>
        </div>

        <div class="password-strength hidden" id="password-strength">
          <div class="strength-bar">
            <div class="strength-fill" id="strength-fill"></div>
          </div>
          <span class="strength-text" id="strength-text">Weak</span>
        </div>

        <button type="submit" class="btn-submit" id="btn-signup">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader hidden" id="signup-loader">
            <span class="spinner"></span>
          </span>
        </button>

        <div class="form-error hidden" id="signup-error"></div>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span>or continue with</span>
      </div>

      <!-- Social Login -->
      <div class="social-buttons">
        <button class="btn-social" id="btn-google" title="Continue with Google">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Google</span>
        </button>
        <button class="btn-social" id="btn-github" title="Continue with GitHub">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          <span>GitHub</span>
        </button>
      </div>

    </div>

    <!-- Footer -->
    <p class="login-footer">
      Made with 💜 by <strong>PVmusic</strong>
    </p>
  </div>

  <script src="login.js"></script>
</body>
</html>
